name: Sync Secrets to Cloudflare
description: Push GitHub Actions environment secrets to a Cloudflare Worker via `wrangler secret bulk`.
inputs:
  working-directory:
    description: Directory containing the wrangler config.
    required: true
  cloudflare-api-token:
    description: Cloudflare API token.
    required: true
  cloudflare-account-id:
    description: Cloudflare account ID.
    required: true
  secrets-json:
    description: JSON object of secrets to push, typically toJSON(secrets) from the caller. CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, and github_token are stripped before push.
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare-api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare-account-id }}
        ALL_SECRETS: ${{ inputs.secrets-json }}
      run: |
        printf '%s' "$ALL_SECRETS" \
          | jq 'del(.CLOUDFLARE_API_TOKEN, .CLOUDFLARE_ACCOUNT_ID, .github_token)' \
          | pnpm wrangler secret bulk
